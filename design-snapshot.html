style>/* ====================================================================\n   Tec-Tel × Hanwha — A software-first path off Pelco\n   The Buffalo History Museum\n   Brand ported from the Tec-Tel Aisle Safety system:\n   navy / blue / violet · Manrope + JetBrains Mono\n   ==================================================================== */\n\n:root {\n  --navy:        #1F2A44;\n  --navy-deep:   #131A2B;\n  --navy-700:    #2A375A;\n  --navy-50:     #EEF1F8;\n  --blue:        #2E75B6;\n  --blue-50:     #E8F1FA;\n  --blue-100:    #D2E2F2;\n  --violet:      #6B4DE6;\n  --violet-50:   #EEEAFC;\n  --violet-100:  #DCD3F8;\n  --paper:       #FFFFFF;\n  --ink:         #0F1115;\n  --ink-2:       #3A4456;\n  --ink-3:       #6B7488;\n  --ink-4:       #9AA3B5;\n  --rule:        #DDE2EA;\n  --rule-2:      #ECEFF4;\n  --tint:        #F5F7FB;\n  --green-ok:    #1F7A4D;\n  --amber:       #C4820E;\n  --danger:      #E04D4D;\n\n  --maxw: 1180px;\n  --gut: 40px;\n  --r: 14px;\n  --shadow-card: 0 1px 0 rgba(15,25,50,.04), 0 22px 50px -28px rgba(15,25,50,.30), 0 6px 16px -10px rgba(15,25,50,.12);\n}\n\n*, *::before, *::after { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; scroll-padding-top: 92px; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  background: var(--paper);\n  font-family: \"Manrope\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  color: var(--ink);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: geometricPrecision;\n  font-feature-settings: \"ss01\", \"kern\", \"liga\", \"cv11\";\n  line-height: 1.5;\n}\nimg { display: block; max-width: 100%; }\na { color: inherit; }\n.mono { font-family: \"JetBrains Mono\", ui-monospace, monospace; }\n\n.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gut); }\n\n/* —— Texture utilities —— */\n.tex-dots-d {\n  background-image: radial-gradient(rgba(255,255,255,.07) 1px, transparent 1px);\n  background-size: 18px 18px;\n}\n.tex-grid-d {\n  background-image:\n    linear-gradient(rgba(46,117,182,.10) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(46,117,182,.10) 1px, transparent 1px);\n  background-size: 30px 30px;\n}\n\n/* ====================================================================\n   NAV\n   ==================================================================== */\n.nav {\n  position: sticky; top: 0; z-index: 60;\n  background: rgba(255,255,255,.86);\n  backdrop-filter: saturate(180%) blur(14px);\n  border-bottom: 1px solid var(--rule);\n}\n.nav__row { display: flex; align-items: center; gap: 28px; height: 70px; }\n.nav__lockup { display: flex; align-items: center; gap: 12px; text-decoration: none; }\n.nav__logo { height: 24px; width: auto; }\n.nav__div { width: 1px; height: 18px; background: var(--rule); }\n.nav__partner {\n  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;\n  color: var(--ink-3); font-weight: 700; white-space: nowrap;\n}\n.nav__partner b { color: var(--ink); }\n.nav__dot {\n  width: 7px; height: 7px; border-radius: 50%; background: var(--violet);\n  display: inline-block; margin-right: 7px;\n  box-shadow: 0 0 0 3px rgba(107,77,230,.18);\n}\n.nav__links { display: flex; gap: 26px; margin-left: auto; }\n.nav__links a {\n  text-decoration: none; font-size: 13.5px; font-weight: 600; color: var(--ink-2);\n  letter-spacing: -0.01em; transition: color .15s;\n}\n.nav__links a:hover { color: var(--blue); }\n.nav__cta {\n  text-decoration: none; background: var(--blue); color: #fff;\n  font-size: 13px; font-weight: 700; letter-spacing: -0.01em;\n  padding: 11px 18px; border-radius: 999px;\n  white-space: nowrap; transition: background .15s, transform .15s;\n}\n.nav__cta:hover { background: #265f95; transform: translateY(-1px); }\n\n/* ====================================================================\n   BUTTONS / EYEBROWS / SECTION HEADS  (shared)\n   ==================================================================== */\n.btn {\n  display: inline-flex; align-items: center; gap: 10px;\n  text-decoration: none; font-weight: 700; font-size: 14px; letter-spacing: -0.01em;\n  padding: 14px 22px; border-radius: 999px; cursor: pointer; border: 0;\n  transition: background .15s, transform .15s, border-color .15s;\n}\n.btn--primary { background: var(--blue); color: #fff; }\n.btn--primary:hover { background: #265f95; transform: translateY(-1px); }\n.btn--ghost-d { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.28); }\n.btn--ghost-d:hover { border-color: rgba(255,255,255,.6); background: rgba(255,255,255,.06); }\n.btn--ghost { background: transparent; color: var(--navy); border: 1px solid var(--rule); }\n.btn--ghost:hover { border-color: var(--blue); color: var(--blue); }\n.btn .arrow { transition: transform .15s; }\n.btn:hover .arrow { transform: translateX(3px); }\n\n.eyebrow {\n  display: inline-flex; align-items: center; gap: 11px;\n  font-family: \"JetBrains Mono\", monospace;\n  font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;\n  font-weight: 600; color: var(--blue); margin: 0 0 18px;\n}\n.eyebrow::before { content: \"\"; width: 28px; height: 1px; background: currentColor; }\n.eyebrow--violet { color: var(--violet); }\n.eyebrow--ink { color: var(--ink-3); }\n\n.section { padding: 96px 0; }\n.section--tint { background: var(--tint); }\n.h2 {\n  font-weight: 800; font-size: clamp(30px, 4vw, 46px); line-height: 1.04;\n  letter-spacing: -0.03em; color: var(--navy); margin: 0 0 18px; max-width: 18ch;\n  text-wrap: balance;\n}\n.h2 em { font-style: normal; color: var(--blue); }\n.h2 em.v { color: var(--violet); }\n.lede { font-size: 17px; line-height: 1.6; color: var(--ink-2); max-width: 62ch; margin: 0; }\n.lede b { color: var(--navy); font-weight: 700; }\n\n/* ====================================================================\n   HERO\n   ==================================================================== */\n.hero { background: var(--navy-deep); color: #fff; position: relative; overflow: hidden; }\n.hero__glow {\n  position: absolute; top: -260px; right: -180px; width: 680px; height: 680px;\n  background: radial-gradient(circle, rgba(46,117,182,.28), transparent 60%); pointer-events: none;\n}\n.hero__glow2 {\n  position: absolute; bottom: -340px; left: -220px; width: 720px; height: 720px;\n  background: radial-gradient(circle, rgba(107,77,230,.20), transparent 62%); pointer-events: none;\n}\n.hero__texture { position: absolute; inset: 0; opacity: .5; pointer-events: none; }\n.hero__inner {\n  position: relative; z-index: 2;\n  display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 56px; align-items: center;\n  padding: 70px 0 84px;\n}\n.prepared {\n  display: inline-flex; align-items: center; gap: 9px;\n  font-family: \"JetBrains Mono\", monospace;\n  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;\n  color: rgba(255,255,255,.7); font-weight: 600;\n  border: 1px solid rgba(255,255,255,.18); border-radius: 999px;\n  padding: 8px 14px; margin-bottom: 26px;\n}\n.prepared .live {\n  width: 7px; height: 7px; border-radius: 50%; background: var(--violet);\n  box-shadow: 0 0 0 3px rgba(107,77,230,.25);\n}\n.hero h1 {\n  font-weight: 800; font-size: clamp(36px, 5vw, 60px); line-height: 1.02;\n  letter-spacing: -0.035em; margin: 0 0 24px; color: #fff; text-wrap: balance;\n}\n.hero h1 em { font-style: normal; color: var(--blue); }\n.hero__sub { font-size: 17px; line-height: 1.62; color: rgba(255,255,255,.74); max-width: 52ch; margin: 0 0 30px; }\n.hero__sub b { color: #fff; font-weight: 600; }\n.hero__ctas { display: flex; flex-wrap: wrap; gap: 14px; }\n\n/* —— WAVE interface mock (hero visual) —— */\n.waveui {\n  position: relative; border-radius: var(--r); overflow: hidden;\n  border: 1px solid rgba(255,255,255,.12); background: #0E1626;\n  box-shadow: 0 40px 80px -30px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.05);\n}\n.waveui__bar {\n  display: flex; align-items: center; gap: 10px;\n  padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,.09);\n  background: rgba(255,255,255,.02);\n}\n.waveui__brand {\n  font-family: \"JetBrains Mono\", monospace; font-size: 11px; letter-spacing: 0.16em;\n  text-transform: uppercase; color: #fff; font-weight: 700;\n}\n.waveui__brand span { color: var(--blue); }\n.waveui__meta {\n  margin-left: auto; font-family: \"JetBrains Mono\", monospace; font-size: 10.5px;\n  letter-spacing: 0.1em; color: rgba(255,255,255,.55);\n}\n.waveui__grid {\n  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 8px;\n}\n.tile { position: relative; aspect-ratio: 4/3; border-radius: 5px; overflow: hidden; background: #172336; }\n.tile::after {\n  content: \"\"; position: absolute; inset: 0;\n  background: linear-gradient(160deg, rgba(255,255,255,.05), transparent 55%);\n}\n.tile__lbl {\n  position: absolute; left: 7px; bottom: 6px; z-index: 2;\n  font-family: \"JetBrains Mono\", monospace; font-size: 8.5px; letter-spacing: 0.06em;\n  color: rgba(255,255,255,.82); text-shadow: 0 1px 2px rgba(0,0,0,.6);\n}\n.tile__rec {\n  position: absolute; right: 7px; top: 6px; z-index: 2;\n  width: 6px; height: 6px; border-radius: 50%; background: var(--danger);\n  box-shadow: 0 0 0 2px rgba(224,77,77,.25); animation: blink 1.6s steps(2) infinite;\n}\n.tile--g1 { background: linear-gradient(150deg, #2b3550, #3a4a2e); }\n.tile--g2 { background: linear-gradient(150deg, #2a3346, #4a3b2c); }\n.tile--g3 { background: linear-gradient(150deg, #232d44, #34405c); }\n.tile--g4 { background: linear-gradient(150deg, #2e3550, #453040); }\n.tile--g5 { background: linear-gradient(150deg, #263049, #2f4436); }\n.tile--g6 { background: linear-gradient(150deg, #2a3247, #3b3350); }\n@keyframes blink { 50% { opacity: .3; } }\n.waveui__foot {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 10px 14px; border-top: 1px solid rgba(255,255,255,.09);\n  font-family: \"JetBrains Mono\", monospace; font-size: 10px; letter-spacing: 0.08em;\n  color: rgba(255,255,255,.6);\n}\n.waveui__foot  #fff; }\n.plan-col--now .mk { color: var(--blue); font-weight: 800; }\n.plan-col--next { border-color: var(--violet-100); }\n.plan-col--next .plan-col__head { background: var(--violet-50); }\n.plan-col--next .plan-col__when { background: var(--violet); color: #fff; }\n.plan-col--next .mk { color: var(--violet); font-weight: 800; }\n\n/* ====================================================================\n   WHY TEC-TEL\n   ==================================================================== */\n.intg-stats { margin-top: 40px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }\n.intg-stat { border-top: 2px solid var(--navy); padding-top: 16px; }\n.intg-stat b { display: block; font-size: 32px; font-weight: 800; color: var(--navy); letter-spacing: -0.03em; line-height: 1.05; }\n.intg-stat span { font-size: 13.5px; color: var(--ink-3); margin-top: 8px; display: block; line-height: 1.4; }\n.intg-note {\n  margin-top: 28px; padding: 24px 28px; border-radius: var(--r); background: var(--paper);\n  border: 1px solid var(--rule); border-left: 3px solid var(--blue);\n}\n.intg-note .lbl {\n  font-family: \"JetBrains Mono\", monospace; font-size: 11px; letter-spacing: 0.16em;\n  text-transform: uppercase; color: var(--blue); font-weight: 700; margin-bottom: 8px;\n}\n.intg-note p { font-size: 15px; line-height: 1.6; color: var(--ink-2); margin: 0; }\n\n/* ====================================================================\n   FINAL CTA + FOOTER\n   ==================================================================== */\n.cta { background: var(--navy-deep); color: #fff; position: relative; overflow: hidden; }\n.cta__glow { position: absolute; bottom: -300px; right: -160px; width: 640px; height: 640px; background: radial-gradient(circle, rgba(46,117,182,.26), transparent 62%); pointer-events: none; }\n.cta__inner { position: relative; z-index: 2; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 48px; align-items: center; padding: 90px 0; }\n.cta h2 { font-size: clamp(32px, 4.4vw, 52px); font-weight: 800; letter-spacing: -0.035em; line-height: 1.04; margin: 0 0 18px; color: #fff; text-wrap: balance; }\n.cta h2 em { font-style: normal; color: var(--blue); }\n.cta__sub { font-size: 17px; line-height: 1.6; color: rgba(255,255,255,.74); margin: 0 0 28px; max-width: 48ch; }\n.cta__ctas { display: flex; flex-wrap: wrap; gap: 14px; }\n.contact-card { border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.03); border-radius: var(--r); padding: 28px; }\n.contact-card__row { display: flex; align-items: center; gap: 16px; }\n.contact-card__av {\n  width: 56px; height: 56px; border-radius: 14px; flex: none;\n  background: linear-gradient(135deg, var(--navy-700), var(--blue)); color: #fff;\n  display: grid; place-items: center; font-size: 15px; font-weight: 800; letter-spacing: 0.04em;\n  font-family: \"JetBrains Mono\", monospace;\n}\n.contact-card__name { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.01em; }\n.contact-card__role { font-size: 12.5px; color: rgba(255,255,255,.6); margin-top: 3px; }\n.contact-card__lines { margin-top: 20px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,.12); display: grid; gap: 12px; }\n.contact-card__line { display: flex; align-items: center; gap: 11px; font-family: \"JetBrains Mono\", monospace; font-size: 13px; color: #fff; }\n.contact-card__line a { color: #fff; text-decoration: none; }\n.contact-card__line a:hover { color: var(--blue); }\n.contact-card__line .ic { color: var(--blue); width: 16px; text-align: center; }\n\n.footer { background: #0B1220; color: rgba(255,255,255,.6); padding: 50px 0 44px; }\n.footer__top { display: flex; align-items: center; justify-content: space-between; gap: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,.1); flex-wrap: wrap; }\n.footer__lockup { display: flex; align-items: center; gap: 12px; }\n.footer__logo { height: 22px; width: auto; }\n.footer__div { width: 1px; height: 16px; background: rgba(255,255,255,.2); }\n.footer__partner { font-family: \"JetBrains Mono\", monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,.7); }\n.footer__meta { font-family: \"JetBrains Mono\", monospace; font-size: 11px; letter-spacing: 0.1em; color: rgba(255,255,255,.5); }\n.footer__disclaimer { margin-top: 22px; font-size: 12px; line-height: 1.65; color: rgba(255,255,255,.45); max-width: 96ch; }\n.footer__sources { margin-top: 16px; font-size: 11.5px; line-height: 1.65; color: rgba(255,255,255,.4); }\n.footer__sources b { color: rgba(255,255,255,.6); }\n\n/* ====================================================================\n   REVEAL\n   ==================================================================== */\n.reveal { opacity: 0; transform: translateY(16px); transition: opacity .6s ease, transform .6s ease; }\n.reveal.in { opacity: 1; transform: none; }\n\n/* ====================================================================\n   RESPONSIVE\n   ==================================================================== */\n@media (max-width: 980px) {\n  .nav__links { display: none; }\n  .hero__inner { grid-template-columns: 1fr; gap: 36px; padding: 48px 0 56px; }\n  .chips { grid-template-columns: 1fr 1fr; }\n  .chip:nth-child(2) { border-right: 0; }\n  .chip:nth-child(1), .chip:nth-child(2) { border-bottom: 1px solid rgba(255,255,255,.12); }\n  .own, .cloud, .plan { grid-template-columns: 1fr; }\n  .rules { grid-template-columns: 1fr; }\n  .p2-grid, .cta__inner { grid-template-columns: 1fr; gap: 32px; }\n  .intg-stats { grid-template-columns: 1fr 1fr; gap: 26px; }\n  .bridge { grid-template-columns: 1fr; }\n  .bridge__link { padding: 16px; }\n  .bridge__arrow { transform: rotate(90deg); }\n}\n@media (max-width: 600px) {\n  :root { --gut: 22px; }\n  .section { padding: 64px 0; }\n  .chips, .intg-stats { grid-template-columns: 1fr; }\n  .chip { border-right: 0; border-bottom: 1px solid rgba(255,255,255,.12); }\n  .waveui__grid { grid-template-columns: repeat(2, 1fr); }\n  .nav__partner { display: none; }\n}\n@media (prefers-reduced-motion: reduce) {\n  .reveal { opacity: 1; transform: none; transition: none; }\n  html { scroll-behavior: auto; }\n  .tile__rec, .feed__rec { animation: none; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ==================== NAV ==================== -->\n<header class=\"nav\">\n  <div class=\"wrap nav__row\">\n    <a class=\"nav__lockup\" href=\"#top\" aria-label=\"Tec-Tel\">\n      <img class=\"nav__logo\" src=\"22c12055-df92-4154-8db8-1e9efcb590ab\" alt=\"Tec-Tel\">\n      <span class=\"nav__div\"><\u002Fspan>\n      <span class=\"nav__partner\"><span class=\"nav__dot\"><\u002Fspan>× Hanwha&nbsp;Vision<\u002Fspan>\n    <\u002Fa>\n    <nav class=\"nav__links\">\n      <a href=\"#continuity\">Continuity<\u002Fa>\n      <a href=\"#own\">Own It<\u002Fa>\n      <a href=\"#ai\">Phase 2 AI<\u002Fa>\n      <a href=\"#cloud\">Cloud Option<\u002Fa>\n      <a href=\"#rules\">Grant Rules<\u002Fa>\n      <a href=\"#plan\">The Plan<\u002Fa>\n    <\u002Fnav>\n    <a class=\"nav__cta\" href=\"#book\">Book the next call<\u002Fa>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ==================== HERO ==================== -->\n<section class=\"hero\" id=\"top\">\n  <div class=\"hero__glow\"><\u002Fdiv>\n  <div class=\"hero__glow2\"><\u002Fdiv>\n  <div class=\"hero__texture tex-dots-d\"><\u002Fdiv>\n  <div class=\"wrap hero__inner\">\n    <div>\n      <span class=\"prepared\"><span class=\"live\"><\u002Fspan>Prepared for The Buffalo History Museum · Attn: Robin Foley<\u002Fspan>\n      <h1>Run <em>Wisenet WAVE<\u002Fem> on the cameras you already have.<\u002Fh1>\n      <p class=\"hero__sub\">Wisenet WAVE installs on a small server and connects to your existing Pelco cameras over ONVIF, so you move off VideoXpert this summer with no coverage gap. You don't have to solve the whole camera project to do it. Then in the fall, the grant pays for the AI cameras. <b>Two clean steps.<\u002Fb><\u002Fp>\n      <div class=\"hero__ctas\">\n        <a class=\"btn btn--primary\" href=\"#explainer\">Watch the 90-second walkthrough <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n        <a class=\"btn btn--ghost-d\" href=\"#plan\">See the two-step plan<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"waveui\" aria-label=\"Illustration of the Wisenet WAVE video management interface\">\n      <div class=\"waveui__bar\">\n        <span class=\"waveui__brand\">Wisenet <span>WAVE<\u002Fspan><\u002Fspan>\n        <span class=\"waveui__meta\">12 CH · ONVIF · LOCAL SERVER<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"waveui__grid\">\n        <div class=\"tile tile--g1\"><span class=\"tile__rec\"><\u002Fspan><span class=\"tile__lbl\">GALLERY · EAST<\u002Fspan><\u002Fdiv>\n        <div class=\"tile tile--g2\"><span class=\"tile__rec\"><\u002Fspan><span class=\"tile__lbl\">MAIN STAIR<\u002Fspan><\u002Fdiv>\n        <div class=\"tile tile--g3\"><span class=\"tile__rec\"><\u002Fspan><span class=\"tile__lbl\">ROTUNDA<\u002Fspan><\u002Fdiv>\n        <div class=\"tile tile--g4\"><span class=\"tile__rec\"><\u002Fspan><span class=\"tile__lbl\">LOADING DOCK<\u002Fspan><\u002Fdiv>\n        <div class=\"tile tile--g5\"><span class=\"tile__rec\"><\u002Fspan><span class=\"tile__lbl\">ARCHIVE HALL<\u002Fspan><\u002Fdiv>\n        <div class=\"tile tile--g6\"><span class=\"tile__rec\"><\u002Fspan><span class=\"tile__lbl\">LOBBY<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"waveui__foot\">\n        <span><span class=\"ok\">● 12 cameras online<\u002Fspan><\u002Fspan>\n        <span>Existing cameras <span class=\"via\">via ONVIF<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"wrap\">\n    <div class=\"chips\">\n      <div class=\"chip\"><b>This summer<\u002Fb><span>Off Pelco VideoXpert, no gap<\u002Fspan><\u002Fdiv>\n      <div class=\"chip\"><b>Your cameras<\u002Fb><span>Kept live over ONVIF<\u002Fspan><\u002Fdiv>\n      <div class=\"chip\"><b>No annual fees<\u002Fb><span>Perpetual license, you own it<\u002Fspan><\u002Fdiv>\n      <div class=\"chip\"><b>Fall grant<\u002Fb><span>AI cameras, real-time alerts<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== EXPLAINER SLOT ==================== -->\n<section class=\"explainer\" id=\"explainer\">\n  <div class=\"wrap\">\n    <section id=\"explainer-slot\" aria-label=\"software walkthrough\">\n      <div class=\"slot__inner\">\n        <div class=\"slot__play\" aria-hidden=\"true\">\n          <svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M8 5v14l11-7z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <p class=\"slot__eyebrow\">Software walkthrough<\u002Fp>\n        <h3>How the WAVE platform works, in about 90 seconds<\u002Fh3>\n        <p>A short, calm walkthrough: WAVE goes live on your existing Pelco cameras, then the new Hanwha AI cameras add real-time alerts.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <p class=\"explainer__cap\">Animated explainer embeds here.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== CONTINUITY ==================== -->\n<section class=\"section\" id=\"continuity\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow\">Your building. Your cameras. Keep them running.<\u002Fp>\n    <h2 class=\"h2\">The cameras stay live. The <em>software<\u002Fem> is what changes.<\u002Fh2>\n    <p class=\"lede\">Wisenet WAVE talks to your existing Pelco cameras over ONVIF, the open standard both systems already speak. We install WAVE on a small server inside the museum and point it at the cameras that are mounted right now. Nothing comes off the wall. There is no day where the building goes dark.<\u002Fp>\n\n    <div class=\"bridge\">\n      <div class=\"bridge__node\">\n        <span class=\"bridge__kicker\">Today<\u002Fspan>\n        <span class=\"bridge__title\">Your Pelco cameras<\u002Fspan>\n        <span class=\"bridge__desc\">The interior and exterior cameras already mounted, now on freshly wired runs and stronger WiFi.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"bridge__link\">\n        <span class=\"bridge__pipe\">ONVIF<\u002Fspan>\n        <span class=\"bridge__arrow\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"bridge__node bridge__node--dark\">\n        <span class=\"bridge__kicker\">This summer<\u002Fspan>\n        <span class=\"bridge__title\">Wisenet WAVE server<\u002Fspan>\n        <span class=\"bridge__desc\">A small on-site server records and manages every camera. This is the piece that retires VideoXpert.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"bridge__link\">\n        <span class=\"bridge__pipe\">Live view<\u002Fspan>\n        <span class=\"bridge__arrow\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"bridge__node\">\n        <span class=\"bridge__kicker\">Day one<\u002Fspan>\n        <span class=\"bridge__title\">Your team, in WAVE<\u002Fspan>\n        <span class=\"bridge__desc\">Browser and mobile access to live and recorded video. Same cameras, a platform that isn't being discontinued.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"continuity-note\">\n      <div class=\"lbl\">No coverage gap<\u002Fdiv>\n      <p>Because WAVE runs alongside the cameras you already own, you cut over on your schedule. The reliable exterior cameras you want to keep just keep working. When the fall camera project lands, the interior units get swapped into the same platform. <b>One system, two calm steps.<\u002Fb><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== OWN IT ==================== -->\n<section class=\"section section--tint\" id=\"own\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow\">The money story for a grant-funded nonprofit<\u002Fp>\n    <h2 class=\"h2\">Own it, <em>don't rent it.<\u002Fem><\u002Fh2>\n    <p class=\"lede\">Wisenet WAVE is a perpetual license. You pay once, per camera channel, and the software is yours. No annual renewal, no subscription that grows every budget cycle. For an institution that plans in grant years, that is the difference between a one-time line item and a bill that never stops.<\u002Fp>\n\n    <div class=\"own\">\n      <div class=\"own-card own-card--lead\">\n        <span class=\"own-card__flag\">Our recommendation<\u002Fspan>\n        <div class=\"own-card__name\">Wisenet WAVE, on-premise<\u002Fdiv>\n        <div class=\"own-card__sub\">Runs on a small server inside the museum.<\u002Fdiv>\n        <ul>\n          <li><span class=\"mk\">✓<\u002Fspan><span><b>Perpetual license.<\u002Fb> Buy it once, own it outright.<\u002Fspan><\u002Fli>\n          <li><span class=\"mk\">✓<\u002Fspan><span><b>No annual fees.<\u002Fb> No recurring software cost to defend each year.<\u002Fspan><\u002Fli>\n          <li><span class=\"mk\">✓<\u002Fspan><span><b>Lifetime software upgrades<\u002Fb> included with the license.<\u002Fspan><\u002Fli>\n          <li><span class=\"mk\">✓<\u002Fspan><span><b>One license per camera channel.<\u002Fb> You scale by the camera, not by a tier.<\u002Fspan><\u002Fli>\n          <li><span class=\"mk\">✓<\u002Fspan><span><b>Ingests your Pelco cameras today<\u002Fb> over ONVIF, so the platform stands up before any new hardware.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"own-card own-card--alt\">\n        <span class=\"own-card__flag\">Where it fits<\u002Fspan>\n        <div class=\"own-card__name\">Why this suits the museum<\u002Fdiv>\n        <div class=\"own-card__sub\">A one-time cost, purchased outside the grant.<\u002Fdiv>\n        <ul>\n          <li><span class=\"mk\">◆<\u002Fspan><span>The software decision happens <b>this summer<\u002Fb>, on its own budget, so procurement rules for the camera grant never dictate the platform.<\u002Fspan><\u002Fli>\n          <li><span class=\"mk\">◆<\u002Fspan><span>A perpetual license is <b>capital, not a lease.<\u002Fb> It reads cleanly on a nonprofit's books.<\u002Fspan><\u002Fli>\n          <li><span class=\"mk\">◆<\u002Fspan><span>You set the standard now, and every camera added later, this fall or years from now, drops into the same system.<\u002Fspan><\u002Fli>\n          <li><span class=\"mk\">◆<\u002Fspan><span>Final pricing per channel and the server spec are in the proposal, sized to your exact channel count.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"capex\">\n      <div class=\"capex__glow\"><\u002Fdiv>\n      <div class=\"capex__inner\">\n        <p class=\"capex__eyebrow\">The grant-friendly shape<\u002Fp>\n        <div class=\"capex__big\">Buy the platform once, this summer. Then let the <em>fall grant<\u002Fem> pay for the cameras that ride on it.<\u002Fdiv>\n        <p class=\"capex__sub\">Software and cameras are two separate purchases with two separate budgets. That is exactly what keeps the platform choice out of a lowest-bid camera procurement. Exact figures are covered in the written proposal and on our next call.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== PHASE 2 AI ==================== -->\n<section class=\"section\" id=\"ai\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow eyebrow--violet\">Then the part that changes everything<\u002Fp>\n    <h2 class=\"h2\">In the fall, the new cameras start <em class=\"v\">watching for you.<\u002Fem><\u002Fh2>\n    <p class=\"lede\">This is what you actually asked for. Real-time alerting, not footage you review after something already happened. The grant-funded Hanwha AI cameras run detection on the camera itself, so WAVE can notify your team the moment something looks wrong, day or night, whether or not anyone is at the desk.<\u002Fp>\n\n    <div class=\"p2-grid\">\n      <div class=\"feed\" aria-label=\"Illustration of a Hanwha AI camera detection in WAVE\">\n        <div class=\"feed__scene\">\n          <div class=\"feed__hud\">\n            <span class=\"l\"><span class=\"feed__rec\"><\u002Fspan>LIVE · GALLERY EAST<\u002Fspan>\n            <span>AI CAMERA<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"det\" style=\"left:32%; bottom:20%; width:36%; height:40%;\">\n            <span class=\"det__lbl\">AFTER-HOURS INTRUSION · ALERT<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"feed__foot\">\n            <span>02:14 AM<\u002Fspan>\n            <span>WAVE · RULE ENGINE<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"p2-points\">\n        <div class=\"p2-point\">\n          <div class=\"p2-point__ic\">1<\u002Fdiv>\n          <div>\n            <h4>Real-time intrusion and loitering alerts<\u002Fh4>\n            <p>After-hours motion in a gallery, someone crossing a line they shouldn't, a person lingering where they shouldn't. The camera flags it and WAVE pushes the alert right away.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"p2-point\">\n          <div class=\"p2-point__ic\">2<\u002Fdiv>\n          <div>\n            <h4>Alerts routed to your people<\u002Fh4>\n            <p>The right staff member gets notified with the camera, the time, and a snapshot, so a response starts in minutes instead of being discovered the next morning.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"p2-point\">\n          <div class=\"p2-point__ic\">3<\u002Fdiv>\n          <div>\n            <h4>Built for a historic building<\u002Fh4>\n            <p>Rules are set per camera and per zone, so a busy public rotunda and a quiet archive hall each get sensible thresholds. Fewer false alarms, more signal.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"p2-honest\">\n      <b>Straight about what runs when.<\u002Fb> The real-time AI alerts come from the new Hanwha AI cameras in Phase 2. Your existing Pelco cameras connect to WAVE for live view and recording, which is exactly what gets you off VideoXpert now. They keep running for continuity, but the AI overlay needs the new cameras. We won't tell you an old camera can do something it can't.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== CLOUD OPTION ==================== -->\n<section class=\"section section--tint\" id=\"cloud\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow eyebrow--violet\">If you'd rather not run a server<\u002Fp>\n    <h2 class=\"h2\">There's a cloud path too. <em class=\"v\">We'll be honest about the trade.<\u002Fem><\u002Fh2>\n    <p class=\"lede\">If the museum would prefer not to keep a server on-site, Hanwha OnCloud is the alternative. It's a cloud video platform that connects your cameras through a small on-site CloudGateway, works with third-party cameras, and moves the management off your premises. The honest trade is that it's a recurring subscription instead of a one-time purchase.<\u002Fp>\n\n    <div class=\"cloud\">\n      <div class=\"cloud-card\">\n        <h3>Hanwha <em>OnCloud<\u002Fem><\u002Fh3>\n        <p>The same phased idea, hosted in the cloud. Good if you'd rather not maintain a local server or manage storage in the building.<\u002Fp>\n        <ul class=\"cloud-list\">\n          <li><span class=\"mk\">◆<\u002Fspan><span>No on-site recording server to maintain.<\u002Fspan><\u002Fli>\n          <li><span class=\"mk\">◆<\u002Fspan><span>Works with third-party cameras through a CloudGateway, so your existing cameras can still connect.<\u002Fspan><\u002Fli>\n          <li><span class=\"mk\">◆<\u002Fspan><span>Management, updates, and storage handled in the cloud.<\u002Fspan><\u002Fli>\n          <li><span class=\"mk\">◆<\u002Fspan><span>It is a recurring subscription. The cost repeats every year, which is the honest difference from WAVE.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"cloud-compare\">\n        <div class=\"cloud-compare__head\">WAVE vs OnCloud, plainly<\u002Fdiv>\n        <div class=\"cloud-row\"><span>Cost shape<\u002Fspan><b class=\"wave\">WAVE · pay once<\u002Fb><\u002Fdiv>\n        <div class=\"cloud-row\"><span><\u002Fspan><b class=\"oncloud\">OnCloud · yearly<\u002Fb><\u002Fdiv>\n        <div class=\"cloud-row\"><span>On-site server<\u002Fspan><b class=\"wave\">WAVE · yes, small<\u002Fb><\u002Fdiv>\n        <div class=\"cloud-row\"><span><\u002Fspan><b class=\"oncloud\">OnCloud · no<\u002Fb><\u002Fdiv>\n        <div class=\"cloud-row\"><span>You own the software<\u002Fspan><b class=\"wave\">WAVE · yes<\u002Fb><\u002Fdiv>\n        <div class=\"cloud-row\"><span><\u002Fspan><b class=\"oncloud\">OnCloud · subscription<\u002Fb><\u002Fdiv>\n        <div class=\"cloud-row\"><span>Best for the grant<\u002Fspan><b class=\"wave\">WAVE · one-time CapEx<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== GRANT RULES ==================== -->\n<section class=\"section\" id=\"rules\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow\">Honest about the grant rules<\u002Fp>\n    <h2 class=\"h2\">We designed this <em>around<\u002Fem> your rules, not against them.<\u002Fh2>\n    <p class=\"lede\">The plan you're reading is built to respect the grant's constraints, because those constraints are the whole reason this approach works. Separating the software from the camera RFP isn't a workaround. It's the cleanest way to protect the platform decision.<\u002Fp>\n\n    <div class=\"rules\">\n      <div class=\"rule-card\">\n        <div class=\"rule-card__no\">01<\u002Fdiv>\n        <h4>Software and cameras stay separate<\u002Fh4>\n        <p>The WAVE software is purchased this summer, <b>outside the grant.<\u002Fb> The cameras go through the competitive RFP in the fall. Two decisions, two budgets, no conflict.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rule-card\">\n        <div class=\"rule-card__no\">02<\u002Fdiv>\n        <h4>The camera RFP stays competitive<\u002Fh4>\n        <p>The fall camera purchase still runs as a proper <b>three-bid RFP.<\u002Fb> Choosing the platform early doesn't skip procurement. It just means the platform isn't decided by whoever bids lowest on hardware.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rule-card\">\n        <div class=\"rule-card__no\">03<\u002Fdiv>\n        <h4>We respect the assessment split<\u002Fh4>\n        <p>We understand the same vendor can't both do the assessment and the install. We'll be clear about which role we're in, and we won't put you in a position that risks the grant.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== WHY TEC-TEL ==================== -->\n<section class=\"section section--tint\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow eyebrow--ink\">Why Tec-Tel<\u002Fp>\n    <h2 class=\"h2\">Hanwha specialists who actually run the cable.<\u002Fh2>\n    <p class=\"lede\">We deploy Hanwha's Wisenet platform for a living, and we're an integration company first. That means one team that understands the software, the cameras, and the low-voltage work behind them. From a single server stand-up to a full camera cutover, you get one point of contact instead of a chain of finger-pointing.<\u002Fp>\n\n    <div class=\"intg-stats\">\n      <div class=\"intg-stat\"><b>Hanwha<\u002Fb><span>Wisenet WAVE and AI camera specialists<\u002Fspan><\u002Fdiv>\n      <div class=\"intg-stat\"><b>Nationwide<\u002Fb><span>Install and support coverage, coast to coast<\u002Fspan><\u002Fdiv>\n      <div class=\"intg-stat\"><b>ONVIF-fluent<\u002Fb><span>We connect the cameras you already own<\u002Fspan><\u002Fdiv>\n      <div class=\"intg-stat\"><b>One partner<\u002Fb><span>Software, cameras, and cabling under one roof<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"intg-note\">\n      <div class=\"lbl\">What this means for you<\u002Fdiv>\n      <p>The people who recommend the platform are the same people who stand it up and keep it running. When something needs a hand, you call one number and it gets handled.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== TWO-PHASE PLAN ==================== -->\n<section class=\"section\" id=\"plan\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow\">The plan on one screen<\u002Fp>\n    <h2 class=\"h2\">Two steps. <em>Summer software, fall cameras.<\u002Fem><\u002Fh2>\n    <p class=\"lede\">Nothing here depends on solving everything at once. Step one gets you off the discontinued software with the cameras you have. Step two, on the grant's timeline, adds the AI you actually want.<\u002Fp>\n\n    <div class=\"plan\">\n      <div class=\"plan-col plan-col--now\">\n        <div class=\"plan-col__head\">\n          <span class=\"plan-col__when\">Phase 1 · This summer<\u002Fspan>\n          <h3 class=\"plan-col__t\">Stand up WAVE<\u002Fh3>\n          <p class=\"plan-col__lede\">Software, purchased outside the grant.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"plan-col__body\">\n          <ul>\n            <li><span class=\"mk\">✓<\u002Fspan><span>Install Wisenet WAVE on a small on-site server.<\u002Fspan><\u002Fli>\n            <li><span class=\"mk\">✓<\u002Fspan><span>Connect your existing Pelco cameras over ONVIF.<\u002Fspan><\u002Fli>\n            <li><span class=\"mk\">✓<\u002Fspan><span><b>Retire Pelco VideoXpert<\u002Fb> with no coverage gap.<\u002Fspan><\u002Fli>\n            <li><span class=\"mk\">✓<\u002Fspan><span>Set the platform standard the fall project builds on.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"plan-col plan-col--next\">\n        <div class=\"plan-col__head\">\n          <span class=\"plan-col__when\">Phase 2 · Fall 2026<\u002Fspan>\n          <h3 class=\"plan-col__t\">Add the AI cameras<\u002Fh3>\n          <p class=\"plan-col__lede\">Hardware, through the competitive grant RFP.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"plan-col__body\">\n          <ul>\n            <li><span class=\"mk\">◆<\u002Fspan><span>Replace the 25 to 30 aging interior cameras.<\u002Fspan><\u002Fli>\n            <li><span class=\"mk\">◆<\u002Fspan><span>New Hanwha AI cameras drop straight into WAVE.<\u002Fspan><\u002Fli>\n            <li><span class=\"mk\">◆<\u002Fspan><span><b>Turn on real-time intrusion and vandalism alerts.<\u002Fb><\u002Fspan><\u002Fli>\n            <li><span class=\"mk\">◆<\u002Fspan><span>Keep the reliable exterior cameras right where they are.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== FINAL CTA ==================== -->\n<section class=\"cta\" id=\"book\">\n  <div class=\"cta__glow\"><\u002Fdiv>\n  <div class=\"wrap cta__inner\">\n    <div>\n      <p class=\"eyebrow eyebrow--violet\">Let's lock in the software this summer<\u002Fp>\n      <h2>One call to map the cutover. <em>That's the whole ask.<\u002Fem><\u002Fh2>\n      <p class=\"cta__sub\">Thirty minutes to size the server, count your channels, and set the date you come off VideoXpert. We'll bring the written proposal with real numbers.<\u002Fp>\n      <div class=\"cta__ctas\">\n        <a class=\"btn btn--primary\" href=\"tel:+17325803870\">Call Joe Intoci <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n        <a class=\"btn btn--ghost-d\" href=\"#plan\">Re-read the plan<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"contact-card\">\n      <div class=\"contact-card__row\">\n        <div class=\"contact-card__av\">JI<\u002Fdiv>\n        <div>\n          <div class=\"contact-card__name\">Joe Intoci<\u002Fdiv>\n          <div class=\"contact-card__role\">CEO, Tec-Tel<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"contact-card__lines\">\n        <div class=\"contact-card__line\"><span class=\"ic\">✆<\u002Fspan><a href=\"tel:+17325803870\">732-580-3870<\u002Fa> <span style=\"color:rgba(255,255,255,.45)\">· cell<\u002Fspan><\u002Fdiv>\n        <div class=\"contact-card__line\"><span class=\"ic\">✆<\u002Fspan><a href=\"tel:+18555770400\">855-577-0400<\u002Fa> <span style=\"color:rgba(255,255,255,.45)\">· main<\u002Fspan><\u002Fdiv>\n        <div class=\"contact-card__line\"><span class=\"ic\">◷<\u002Fspan><span>Decide software this summer · camera RFP in fall 2026<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== FOOTER ==================== -->\n<footer class=\"footer\">\n  <div class=\"wrap\">\n    <div class=\"footer__top\">\n      <div class=\"footer__lockup\">\n        <img class=\"footer__logo\" src=\"a5406463-e83d-42b7-9987-a861d71cc0ab\" alt=\"Tec-Tel\">\n        <span class=\"footer__div\"><\u002Fspan>\n        <span class=\"footer__partner\">× Hanwha Vision<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"footer__meta\">Prepared for The Buffalo History Museum · Confidential · Summer 2026<\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"footer__disclaimer\">Wisenet WAVE and Hanwha OnCloud are products of Hanwha Vision. The WAVE interface shown in the hero is an illustration of a video management layout, not a screenshot of the museum's cameras. Real-time AI alerting is provided by the new Hanwha AI cameras in Phase 2. Existing Pelco cameras connect to WAVE over ONVIF for live view and recording only. Final pricing, server specification, and channel counts are provided in the written proposal.<\u002Fp>\n    <p class=\"footer__sources\"><b>Contact:<\u002Fb> Tec-Tel · 855-577-0400. This document reinforces a software-first transition that keeps the camera platform decision independent of the grant-funded camera RFP.<\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n/* ---------- reveal on scroll ---------- */\n(function () {\n  var els = document.querySelectorAll('.reveal');\n  if (!els.length) return;\n  var io = new IntersectionObserver(function (entries) {\n    entries.forEach(function (e) {\n      if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }\n    });\n  }, { threshold: 0.2 });\n  els.forEach(function (el) { io.observe(el); });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
